<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>방 예약 시스템</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <header class="header">
        <h1>Room Reservation</h1>
        <button id="adminToggleBtn" class="admin-btn">관리자 모드</button>
    </header>

    <main>
        <!-- 현재 달의 예약 리스트 -->
        <section class="calendar-section">
            <h2 id="monthTitle"></h2>
            <table class="reservation-table" id="reservationTable">
                <thead>
                    <tr>
                        <th>날짜</th>
                        <th>시작시간</th>
                        <th>종료시간</th>
                        <th>예약자</th>
                        <th>목적</th>
                        <th>방 번호</th>
                        <th>상태</th>
                        <th class="admin-col hidden">관리</th>
                    </tr>
                </thead>
                <tbody id="reservationBody">
                    <!-- JavaScript가 동적으로 채움 -->
                </tbody>
            </table>
        </section>

        <!-- 예약 신청 버튼 -->
        <button id="addReservationBtn" class="add-btn">예약 신청</button>
    </main>

    <!-- 예약 신청 모달 -->
    <div id="reservationModal" class="modal hidden">
        <div class="modal-content">
            <button class="close" id="closeModal" type="button">&times;</button>
            <h3>새 예약 신청</h3>
            <form id="reservationForm">
                <label>날짜: <input type="date" id="dateInput" required /></label>
                <label>시작시간: <input type="time" id="startTimeInput" required /></label>
                <label>종료시간: <input type="time" id="endTimeInput" required /></label>
                <label>예약자명: <input type="text" id="nameInput" required /></label>
                <label>목적: <input type="text" id="purposeInput" required /></label>
                <label>방 선택: <select id="roomSelect" required>
                    <option value="본관101">본관101</option>
                    <option value="본관102">본관102</option>
                    <option value="본관103">본관103</option>
                    <option value="별관101">별관101</option>
                    <option value="별관102">별관102</option>
                    <option value="별관103">별관103</option>
                </select></label>
                <button type="submit" class="submit-btn">예약 등록</button>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
