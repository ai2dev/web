<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오산시 맛집 지도</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
  <!-- 지도 API (카카오) 스크립트 -->
  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=0d55a2d4a7fb5fc036cf04df585b19fb&libraries=services" defer></script>
  <!-- 메인 앱 스크립트 (모듈) -->
  <script type="module" src="assets/js/app.js" defer></script>
</head>
<body>
  <header class="header">
    <h1>오산시 맛집 지도</h1>
  </header>

  <section class="search-section">
    <input type="text" id="location-input" placeholder="주소 혹은 장소 검색" />
    <button id="search-btn">검색</button>
    <div class="filters">
      <select id="category-filter"><option value="">전체</option><option value="한식">한식</option><option value="일식">일식</option><option value="중식">중식</option></select>
      <select id="price-filter"><option value="">가격대</option><option value="low">저가</option><option value="mid">중가</option><option value="high">고가</option></select>
      <label><input type="checkbox" id="parking-filter" /> 주차 가능</label>
      <label><input type="checkbox" id="reservation-filter" /> 예약 가능</label>
    </div>
  </section>

  <section id="map" class="map"></section>
  <section id="list" class="restaurant-list"></section>
  <section id="detail" class="restaurant-detail hidden"></section>

  <!-- 비밀번호 입력 모달 (북마크 암호화) -->
  <div id="pwd-modal" class="modal hidden">
    <div class="modal-content">
      <h2>북마크 암호화 비밀번호</h2>
      <input type="password" id="pwd-input" placeholder="비밀번호를 입력하세요" />
      <button id="pwd-ok">확인</button>
    </div>
  </div>

  <footer class="footer"><p>© 2026 오산맛집 프로젝트</p></footer>
</body>
</html>
